# Release consumer gate (openspec/changes/release-consumer-gate, ADR 0008).
#
# ci.yml triggers on push to main/master and pull_request; this workflow
# triggers on workflow_dispatch only. The two trigger sets are disjoint, so
# they never run on the same event -- ordinary PR CI carries no percentage
# gates by construction (tasks.md 4.1).
#
# The gate is self-contained: it runs the committed gold set
# (internal/goldset) under both execution modes -- no consumer checkout, no
# cross-repo secret. The corpus is owned by this repo, modeled on embedder
# rule workloads, with hand-derived goldens and committed tier assignments
# (internal/perfgate/tiers.json).
name: Release consumer gate

on:
  workflow_dispatch: {}
  # Not wired to fire automatically until the fixed GOMAXPROCS and BENCHTIME
  # values are chosen (empty BENCHTIME fails the bench step) and the gate's
  # verdict is meant to block releases.
  # release:
  #   types: [published]

# contents: write lets the passing gate store its bench-vm.txt as an asset on
# the release it authorized, and read the previous release's asset back as the
# next release's non-regression baseline (design.md "Decision rules").
permissions:
  contents: write

env:
  # design.md "Open inputs": fixed GOMAXPROCS not yet chosen
  GOMAXPROCS: ""
  # design.md "Open inputs": fixed benchtime not yet chosen
  BENCHTIME: ""
  # ADR 0008 "at least ten samples" floor -- real value, not a placeholder
  BENCH_COUNT: "10"

jobs:
  consumer-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: true

      # 3.3: first authorization uses ADR 0008's improvement thresholds; every
      # later release compares this candidate VM against the previous release's
      # stored bench-vm.txt as non-regression (design.md "Decision rules"). The
      # baseline is whichever earlier release still carries the asset; none
      # found means this is the first authorization. Release-triggered only --
      # a workflow_dispatch run has no release identity, so it stays in
      # first-authorization mode with no baseline I/O.
      - name: Determine gate mode
        id: gate-mode
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          baseline_tag=""
          for tag in $(gh release list --limit 30 --json tagName --jq '.[].tagName'); do
            [ "$tag" = "$RELEASE_TAG" ] && continue
            if gh release download "$tag" --pattern bench-vm.txt --output baseline-vm.txt 2>/dev/null; then
              baseline_tag="$tag"
              break
            fi
          done
          if [ -n "$baseline_tag" ]; then
            echo "mode=non-regression" >> "$GITHUB_OUTPUT"
            echo "baseline_tag=$baseline_tag" >> "$GITHUB_OUTPUT"
          else
            echo "mode=first-authorization" >> "$GITHUB_OUTPUT"
          fi

      # 2.1: correctness leg, untimed -- every gold-set fixture under both
      # execution modes against its golden; any failure fails the release.
      - name: Gold set under both execution modes
        run: go test ./internal/goldset/ -count=1

      # 2.1: untimed, never combined with -bench (ADR 0008: race runs are
      # separate and untimed).
      - name: Race suite
        run: go test -race -count=1 ./...

      # 3.1: paired release run -- Evaluator and VM samples interleaved per
      # iteration in one hosted job, fixed GOMAXPROCS and benchtime,
      # BENCH_COUNT samples per cell per mode. Cell names are identical
      # across the two output files so benchstat pairs them. Never combined
      # with -race.
      - name: Paired Evaluator/VM benchmark run
        env:
          GOMAXPROCS: ${{ env.GOMAXPROCS }}
        run: |
          for _ in $(seq "${{ env.BENCH_COUNT }}"); do
            GOLDSET_MODE="eval" go test ./internal/goldset/ -run '^$' -bench . -benchtime="${{ env.BENCHTIME }}" -count=1 -benchmem >> bench-evaluator.txt
            GOLDSET_MODE="vm" go test ./internal/goldset/ -run '^$' -bench . -benchtime="${{ env.BENCHTIME }}" -count=1 -benchmem >> bench-vm.txt
          done

      # 3.2/3.3: benchstat comparison against committed Hot-cell tiers (ADR
      # 0008 "Thresholds"), via internal/perfgate. First authorization pairs
      # this release's Evaluator vs VM against the improvement thresholds;
      # later releases pair the previous release's stored bench-vm.txt (the
      # baseline downloaded above) against this candidate as non-regression.
      # Built once and run as a binary: `go run` collapses the program's
      # exit code to 1, which would make the needs-rerun signal (exit 2)
      # indistinguishable from a failure. The `|| code=$?` capture keeps the
      # runner's `bash -e` from aborting before the output line is written.
      - name: Evaluate performance gate
        id: perfgate
        run: |
          go build -o bin/perfgate ./cmd/perfgate
          mode="${{ steps.gate-mode.outputs.mode }}"
          [ -z "$mode" ] && mode="first-authorization"
          old="bench-evaluator.txt"
          [ "$mode" = "non-regression" ] && old="baseline-vm.txt"
          code=0
          bin/perfgate \
            -old "$old" \
            -candidate bench-vm.txt \
            -tiers internal/perfgate/tiers.json \
            -mode "$mode" \
            -out verdict.txt || code=$?
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          echo "mode=$mode" >> "$GITHUB_OUTPUT"

      # design.md "Decision rules" / ADR 0008 burden-of-proof rule: a still-
      # inconclusive cell (perfgate exit 2) gets exactly one rerun at doubled
      # benchtime, then Resolve() decides it -- improvement claims fail
      # unproven, non-regression claims pass unrefuted. Only runs when the
      # first attempt actually produced an inconclusive cell.
      - name: Rerun paired benchmark at doubled benchtime
        if: steps.perfgate.outputs.exit_code == '2'
        env:
          GOMAXPROCS: ${{ env.GOMAXPROCS }}
        run: |
          doubled=$(awk -v bt="${{ env.BENCHTIME }}" 'BEGIN{match(bt,/^[0-9.]+/);n=substr(bt,RSTART,RLENGTH);s=substr(bt,RSTART+RLENGTH);printf "%s%s", n*2, s}')
          rm -f bench-evaluator.txt bench-vm.txt
          for _ in $(seq "${{ env.BENCH_COUNT }}"); do
            GOLDSET_MODE="eval" go test ./internal/goldset/ -run '^$' -bench . -benchtime="$doubled" -count=1 -benchmem >> bench-evaluator.txt
            GOLDSET_MODE="vm" go test ./internal/goldset/ -run '^$' -bench . -benchtime="$doubled" -count=1 -benchmem >> bench-vm.txt
          done

      - name: Resolve inconclusive cells after rerun
        id: perfgate-rerun
        if: steps.perfgate.outputs.exit_code == '2'
        run: |
          mode="${{ steps.perfgate.outputs.mode }}"
          old="bench-evaluator.txt"
          [ "$mode" = "non-regression" ] && old="baseline-vm.txt"
          code=0
          bin/perfgate \
            -old "$old" \
            -candidate bench-vm.txt \
            -tiers internal/perfgate/tiers.json \
            -mode "$mode" \
            -rerun \
            -out verdict.txt || code=$?
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"

      - name: Enforce performance gate verdict
        run: |
          if [ "${{ steps.perfgate.outputs.exit_code }}" = "2" ]; then
            test "${{ steps.perfgate-rerun.outputs.exit_code }}" = "0"
          else
            test "${{ steps.perfgate.outputs.exit_code }}" = "0"
          fi

      # 3.3: the passing gate stores its bench-vm.txt as an asset on the
      # release it authorized, so the next release can gate against it as the
      # non-regression baseline. Reached only after the verdict step passed
      # (an implicit success() guards every if: without always()); release-
      # triggered only.
      - name: Store VM baseline on the authorized release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: gh release upload "$RELEASE_TAG" bench-vm.txt --clobber

      # 3.4: publish the paired benchmark output and verdict as release
      # evidence, even when the job fails. baseline-vm.txt is present only on
      # post-authorization releases.
      - name: Upload release evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: consumer-gate-evidence
          path: |
            bench-evaluator.txt
            bench-vm.txt
            baseline-vm.txt
            verdict.txt
          if-no-files-found: warn
